type: patch_policy
dataset_class: cube.CubeDataset
data_directory: "${env_vars.datasets.cube}"
language_instruction: "stack the cubes to match their target locations"

# Robot constants
action_dim: 7
num_actions_chunk: 8
proprio_dim: 0
normalization_type: "bounds_q99"
num_views: 1

# Data slicing
window_size: 8
train_fraction: 0.95
subset_fraction: null

# Dataset-specific args
prefetch: true