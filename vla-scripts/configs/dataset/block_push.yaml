type: patch_policy
dataset_class: block_pushing.PushMultiviewTrajectoryDataset
data_directory: "${env_vars.datasets.block_push}"
language_instruction: "push each block to its target location"

# Robot constants
action_dim: 2
num_actions_chunk: 5
proprio_dim: 0
normalization_type: "bounds_q99"
num_views: 2

# Data slicing
window_size: 5
train_fraction: 0.95
subset_fraction: null

# Dataset-specific args
onehot_goals: false
prefetch: true